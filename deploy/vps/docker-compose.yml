services:
  redis:
    image: redis:7.4-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in deploy/vps/.env.worker}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  go-proxy:
    build:
      context: ./go-proxy
    env_file:
      - ./.env.worker
    environment:
      PORT: "20129"
      NINEROUTER_URL: "http://172.17.0.1:20128"
    ports:
      - "20129:20129"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  image-worker:
    build:
      context: ../..
      dockerfile: deploy/vps/Dockerfile.worker
    env_file:
      - ./.env.worker
    environment:
      GO_PROXY_URL: "http://go-proxy:20129"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      go-proxy:
        condition: service_started
    restart: unless-stopped

volumes:
  redis_data:
